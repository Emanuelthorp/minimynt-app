<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>MiniMynt — Spar smarter, lær mer</title>
    <meta name="description" content="Lær barna verdien av penger gjennom ekte oppgaver og Vipps-utbetalinger." />
    <meta name="theme-color" content="#0D9488" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #F7F8FA;
        color: #111827;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      #root {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* Keyboard focus ring — forest green */
      :focus-visible {
        outline: 2px solid #0D9488;
        outline-offset: 2px;
        border-radius: 4px;
      }
      :focus:not(:focus-visible) { outline: none; }

      /* Smooth scroll */
      html { scroll-behavior: smooth; }

      /* Remove tap highlight */
      * { -webkit-tap-highlight-color: transparent; }

      /* Custom scrollbar — subtle green */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #F1F5F9; }
      ::-webkit-scrollbar-thumb {
        background: #CCFBF1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover { background: #0D9488; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
